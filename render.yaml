services:
  # Backend Service
  - type: web
    name: srimurugan-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: 1
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 1d
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://srimurugan-consultancy.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SECURE
        value: auto
      - key: SMTP_REQUIRE_TLS
        value: true
      - key: SMTP_FALLBACK_PORTS
        value: 465
      - key: SMTP_CONNECTION_TIMEOUT
        value: 10000
      - key: SMTP_GREETING_TIMEOUT
        value: 10000
      - key: SMTP_SOCKET_TIMEOUT
        value: 15000
      - key: EMAIL_PROVIDER
        value: auto
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: TEST_EMAIL_API_KEY
        sync: false

  # Frontend Service
  - type: web
    name: srimurugan-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://srimurugan-backend-hdil.onrender.com/api
      - key: VITE_RAZORPAY_KEY_ID
        value: rzp_test_placeholder
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
