services:
  # Backend Service
  - type: web
    name: srimurugan-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 1d
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://srimurugan-consultancy.onrender.com

  # Frontend Service
  - type: web
    name: srimurugan-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://srimurugan-backend-hdil.onrender.com/api
      - key: VITE_RAZORPAY_KEY_ID
        value: rzp_test_placeholder
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
